<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מים</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d14;--text:#f4f6fb;--muted:#9aa3b5;--card:#141826;--line:rgba(255,255,255,.08);--a:#38bdf8;--a2:#0284c7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Heebo',system-ui,sans-serif;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 110px}
h1{font-family:'Rubik';font-weight:900;font-size:30px;text-align:center;padding:14px 0 4px;
 background:linear-gradient(92deg,var(--a),var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:22px}
.glass{position:relative;width:170px;height:230px;margin:0 auto 18px;border:4px solid rgba(255,255,255,.25);
 border-top:none;border-radius:0 0 38px 38px;overflow:hidden;background:rgba(255,255,255,.03)}
.water{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#38bdf8,#0369a1);
 transition:height .6s cubic-bezier(.34,1.4,.64,1);}
.water::before{content:"";position:absolute;top:-8px;left:-20%;width:140%;height:16px;border-radius:50%;
 background:#7dd3fc;opacity:.7;animation:wave 3s ease-in-out infinite}
@keyframes wave{0%,100%{transform:translateX(-6%)}50%{transform:translateX(6%)}}
.count{position:absolute;inset:0;display:grid;place-items:center;font:900 44px 'Rubik';text-shadow:0 2px 8px rgba(0,0,0,.5);z-index:2}
.bigbtn{display:block;width:100%;border:none;cursor:pointer;color:#fff;font:900 26px 'Rubik';
 background:linear-gradient(135deg,var(--a),var(--a2));border-radius:24px;padding:24px;transition:transform .15s;
 box-shadow:0 14px 34px -12px rgba(2,132,199,.55)}
.bigbtn:active{transform:scale(.96)}
.undo{display:block;margin:12px auto 0;background:none;border:1px solid var(--line);color:var(--muted);
 border-radius:14px;padding:9px 20px;font:500 13.5px 'Heebo';cursor:pointer}
.msg{text-align:center;margin-top:16px;font-size:16px;min-height:24px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-top:18px}
.card h2{font-family:'Rubik';font-weight:700;font-size:17px;margin-bottom:12px}
.days{display:flex;gap:6px;direction:ltr}
.day{flex:1;text-align:center}
.day .b{width:100%;min-height:40px;border-radius:11px;display:grid;place-items:center;font-size:13px;font-weight:700;
 background:#0e1220;border:1.5px solid var(--line)}
.day.full .b{background:rgba(56,189,248,.25);border-color:var(--a)}
.day .l{font-size:10.5px;color:var(--muted);margin-top:4px}
.home{position:fixed;bottom:18px;left:18px;z-index:9;color:#fff;border:none;text-decoration:none;
 background:linear-gradient(135deg,#8b5cf6,#6d28d9);border-radius:30px;padding:13px 20px;font:800 14.5px 'Heebo';
 box-shadow:0 10px 24px rgba(109,40,217,.5);transition:transform .15s}
.home:active{transform:scale(.93)}
</style>
</head>
<body>
<div class="wrap">
  <h1>💧 מים</h1>
  <div class="sub">היעד: 8 כוסות ביום. כל לחיצה = כוס.</div>
  <div class="glass"><div class="water" id="water" style="height:0%"></div><div class="count" id="count">0</div></div>
  <button class="bigbtn" onclick="drink()">💧 שתיתי כוס!</button>
  <button class="undo" onclick="undo()">↩ בטל אחת</button>
  <div class="msg" id="msg"></div>
  <div class="card"><h2>📆 השבוע</h2><div class="days" id="days"></div></div>
</div>
<a class="home" href="../index.html">🏠 הביתה</a>
<script>
const GOAL=8;
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)) ?? d}catch(e){return d}};
let data=load('st_water',{}); // {'2026-06-10': 5}
const iso=d=>d.toISOString().slice(0,10);
const today=()=>iso(new Date());
const MSGS=['יפה! 💪','ממשיכים! 🌊','הגוף אומר תודה 🙏','חצי דרך! 🔥','אלוף המים 🏆'];
function render(){
  const n=data[today()]||0;
  document.getElementById('count').textContent=n;
  document.getElementById('water').style.height=Math.min(100,n/GOAL*100)+'%';
  document.getElementById('msg').textContent=n>=GOAL?'🎉 יעד הושג! גוף מתודלק מוכן לעבודה':'';
  const names=['א','ב','ג','ד','ה','ו','ש'];
  let html='';
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const v=data[iso(d)]||0;
    html+=`<div class="day ${v>=GOAL?'full':''}"><div class="b">${v||''}</div><div class="l">${i===0?'היום':names[d.getDay()]}</div></div>`;
  }
  document.getElementById('days').innerHTML=html;
}
function persist(){localStorage.setItem('st_water',JSON.stringify(data))}
function drink(){
  data[today()]=(data[today()]||0)+1;persist();render();
  const n=data[today()];
  if(n<GOAL) document.getElementById('msg').textContent=MSGS[Math.min(n-1,MSGS.length-1)];
  if(navigator.vibrate)navigator.vibrate(40);
}
function undo(){if(data[today()]>0){data[today()]--;persist();render()}}
render();
</script>
</body>
</html>
