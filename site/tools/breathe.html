<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דקה של שקט</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d14;--text:#f4f6fb;--muted:#9aa3b5;--card:#141826;--line:rgba(255,255,255,.08);--a:#2dd4bf;--a2:#0d9488}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Heebo',system-ui,sans-serif;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 110px;text-align:center}
h1{font-family:'Rubik';font-weight:900;font-size:30px;padding:14px 0 4px;
 background:linear-gradient(92deg,var(--a),var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--muted);font-size:14px;margin-bottom:30px}
.circle{width:220px;height:220px;margin:0 auto 26px;border-radius:50%;display:grid;place-items:center;
 background:radial-gradient(circle, rgba(45,212,191,.35), rgba(13,148,136,.12) 70%);
 border:2px solid rgba(45,212,191,.5);transition:transform 4s ease-in-out;transform:scale(.72)}
.circle.in{transform:scale(1.06)}
.circle .t{font:900 26px 'Rubik'}
.circle .c{font:700 15px 'Heebo';color:var(--muted);margin-top:4px}
.bigbtn{display:block;width:100%;border:none;cursor:pointer;color:#fff;font:900 24px 'Rubik';
 background:linear-gradient(135deg,var(--a),var(--a2));border-radius:24px;padding:22px;transition:transform .15s;
 box-shadow:0 14px 34px -12px rgba(13,148,136,.55)}
.bigbtn:active{transform:scale(.96)}
.note{margin-top:22px;color:var(--muted);font-size:14px;line-height:1.7}
.count{margin-top:18px;font-size:15px;color:var(--muted)}
.count b{font-family:'Rubik';color:var(--a);font-size:20px}
.home{position:fixed;bottom:18px;left:18px;z-index:9;color:#fff;border:none;text-decoration:none;
 background:linear-gradient(135deg,#8b5cf6,#6d28d9);border-radius:30px;padding:13px 20px;font:800 14.5px 'Heebo';
 box-shadow:0 10px 24px rgba(109,40,217,.5);transition:transform .15s}
.home:active{transform:scale(.93)}
</style>
</head>
<body>
<div class="wrap">
  <h1>🧘 דקה של שקט</h1>
  <div class="sub">לפני משמרת, אחרי לקוח מעצבן, או סתם. דקה אחת ואתה חדש.</div>
  <div class="circle" id="circle">
    <div><div class="t" id="phase">מוכן?</div><div class="c" id="left"></div></div>
  </div>
  <button class="bigbtn" id="btn" onclick="start()">🧘 התחל דקה</button>
  <div class="note">נושמים עם העיגול: גדל = שאיפה (4 שנ׳) · קטן = נשיפה (4 שנ׳)</div>
  <div class="count" id="count"></div>
</div>
<a class="home" href="../index.html">🏠 הביתה</a>
<script>
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)) ?? d}catch(e){return d}};
let total=load('st_breathe',0);
let running=false,timer=null;
function show(){document.getElementById('count').innerHTML=total>0?`עשית כבר <b>${total}</b> דקות של שקט 🌿`:''}
function start(){
  if(running)return;
  running=true;
  const circle=document.getElementById('circle'),phase=document.getElementById('phase'),
        left=document.getElementById('left'),btn=document.getElementById('btn');
  btn.textContent='נושמים…';
  let sec=60;
  function cycle(inhale){
    if(!running)return;
    circle.classList.toggle('in',inhale);
    phase.textContent=inhale?'שאיפה 🌬️':'נשיפה 😮‍💨';
    setTimeout(()=>cycle(!inhale),4000);
  }
  cycle(true);
  timer=setInterval(()=>{
    sec--; left.textContent=sec+' שנ׳';
    if(sec<=0){
      clearInterval(timer);running=false;
      phase.textContent='כל הכבוד 🌿';left.textContent='';
      btn.textContent='🧘 עוד דקה';
      circle.classList.remove('in');
      total++;localStorage.setItem('st_breathe',JSON.stringify(total));
      if(navigator.vibrate)navigator.vibrate([80,40,80]);
      show();
    }
  },1000);
}
show();
</script>
</body>
</html>
