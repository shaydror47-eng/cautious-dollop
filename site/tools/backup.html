<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גיבוי וייצוא</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d14;--text:#f4f6fb;--muted:#9aa3b5;--card:#141826;--line:rgba(255,255,255,.08);--a:#38bdf8;--a2:#2563eb}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Heebo',system-ui,sans-serif;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 110px}
h1{font-family:'Rubik';font-weight:900;font-size:30px;text-align:center;padding:14px 0 4px;
 background:linear-gradient(92deg,var(--a),var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:22px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;margin-top:16px}
.card h2{font-family:'Rubik';font-weight:700;font-size:18px;margin-bottom:8px}
.card p{color:var(--muted);font-size:14px;margin-bottom:14px;line-height:1.6}
.btn{display:block;width:100%;border:none;cursor:pointer;color:#fff;font:900 19px 'Rubik';
 border-radius:16px;padding:17px;transition:transform .15s;text-align:center;text-decoration:none}
.btn:active{transform:scale(.96)}
.b1{background:linear-gradient(135deg,var(--a),var(--a2))}
.b2{background:linear-gradient(135deg,#475569,#334155)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.stat{background:#0e1220;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
.stat b{display:block;font:900 22px 'Rubik';color:var(--a)}
.stat span{font-size:12px;color:var(--muted)}
input[type=file]{display:none}
.msg{text-align:center;margin-top:14px;min-height:22px;font-size:14.5px;color:#34d399}
.home{position:fixed;bottom:18px;left:18px;z-index:9;color:#fff;border:none;text-decoration:none;
 background:linear-gradient(135deg,#8b5cf6,#6d28d9);border-radius:30px;padding:13px 20px;font:800 14.5px 'Heebo';
 box-shadow:0 10px 24px rgba(109,40,217,.5);transition:transform .15s}
.home:active{transform:scale(.93)}
</style>
</head>
<body>
<div class="wrap">
  <h1>💾 גיבוי וייצוא</h1>
  <div class="sub">כל הנתונים שלך — משמרות, הוצאות, אימונים — בקובץ אחד.</div>

  <div class="card">
    <h2>📦 מה יש לי בזיכרון?</h2>
    <div class="stats" id="stats"></div>
  </div>

  <div class="card">
    <h2>⬇️ ייצוא</h2>
    <p>מוריד קובץ גיבוי עם הכל. שמור אותו בוואטסאפ לעצמך / בדרייב — וזה שלך לתמיד.</p>
    <button class="btn b1" onclick="exportAll()">⬇️ הורד קובץ גיבוי</button>
  </div>

  <div class="card">
    <h2>⬆️ שחזור / העברה לטלפון השני</h2>
    <p>בוחרים קובץ גיבוי — והכל חוזר. ככה מעבירים את הנתונים גם לטלפון 2.</p>
    <label class="btn b2" for="file">⬆️ טען קובץ גיבוי</label>
    <input type="file" id="file" accept=".json" onchange="importAll(event)">
  </div>
  <div class="msg" id="msg"></div>
</div>
<a class="home" href="../index.html">🏠 הביתה</a>
<script>
const KEYS={st_shifts:'משמרות',st_expenses:'הוצאות',st_workouts:'אימונים',st_workoutDays:'ימי אימון',
 st_water:'מים',st_sleep:'לילות שינה',st_goals:'משימות יומיות',st_mood:'ימי יומן',st_checklist:'צ׳קליסט',
 st_breathe:'דקות שקט',st_delivery_data:'נתוני וולט',st_goal:'יעד וולט',st_templates:'תבניות פוסט',
 wheelState:'גלגל',habitPairs:'הרגלים'};
function count(v){try{const x=JSON.parse(v);return Array.isArray(x)?x.length:(typeof x==='object'&&x?Object.keys(x).length:1)}catch(e){return 1}}
function renderStats(){
  let html='',found=0;
  for(const k in KEYS){
    const v=localStorage.getItem(k);
    if(v!==null){html+=`<div class="stat"><b>${count(v)}</b><span>${KEYS[k]}</span></div>`;found++}
  }
  document.getElementById('stats').innerHTML=found?html:'<div class="stat" style="grid-column:1/-1"><span>עוד אין נתונים — תתחיל להשתמש בכלים והכל יופיע פה</span></div>';
}
function exportAll(){
  const data={_app:'my-center',_date:new Date().toISOString(),data:{}};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    data.data[k]=localStorage.getItem(k);
  }
  const blob=new Blob([JSON.stringify(data,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='my-center-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  document.getElementById('msg').textContent='✅ הגיבוי ירד! שמור אותו במקום בטוח.';
}
function importAll(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const j=JSON.parse(r.result);
      if(!j.data) throw 0;
      if(!confirm('לטעון את הגיבוי? זה יחליף את הנתונים הנוכחיים.'))return;
      for(const k in j.data) localStorage.setItem(k,j.data[k]);
      document.getElementById('msg').textContent='✅ הגיבוי נטען! הכל חזר.';
      renderStats();
    }catch(e){document.getElementById('msg').textContent='❌ זה לא קובץ גיבוי תקין.'}
  };
  r.readAsText(f);
}
renderStats();
</script>
</body>
</html>
