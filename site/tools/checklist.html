<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקה לפני משמרת</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d14;--text:#f4f6fb;--muted:#9aa3b5;--card:#141826;--line:rgba(255,255,255,.08);
--accent:#f9763b;--accent2:#e8453c;--ok:#34d399}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Heebo',system-ui,sans-serif;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 110px}
h1{font-family:'Rubik';font-weight:900;font-size:30px;text-align:center;padding:14px 0 4px;
 background:linear-gradient(92deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px}
.item{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
 border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer;user-select:none;transition:opacity .2s}
.item .box{width:46px;height:46px;border-radius:14px;flex:none;display:grid;place-items:center;font-size:24px;
 background:#0e1220;border:2px solid var(--line);transition:all .2s}
.item.done .box{background:linear-gradient(135deg,#10b981,#047857);border-color:transparent}
.item .tx{font-size:16.5px;font-weight:500}
.item.done .tx{opacity:.55;text-decoration:line-through}
.status{text-align:center;font-family:'Rubik';font-weight:900;font-size:22px;margin:20px 0;padding:18px;
 border-radius:20px;background:var(--card);border:1px solid var(--line)}
.status.go{background:linear-gradient(135deg,#10b981,#047857);border:none}
.reset{display:block;margin:14px auto 0;background:none;border:1px solid var(--line);color:var(--muted);
 border-radius:14px;padding:10px 20px;font:500 13.5px 'Heebo';cursor:pointer}
.home{position:fixed;bottom:18px;left:18px;z-index:9;color:#fff;border:none;text-decoration:none;
 background:linear-gradient(135deg,#8b5cf6,#6d28d9);border-radius:30px;padding:13px 20px;font:800 14.5px 'Heebo';
 box-shadow:0 10px 24px rgba(109,40,217,.5);transition:transform .15s}
.home:active{transform:scale(.93)}
</style>
</head>
<body>
<div class="wrap">
  <h1>✅ בדיקה לפני משמרת</h1>
  <div class="sub">מתאפס אוטומטית כל יום — מסמנים ויוצאים לדרך.</div>
  <div id="list"></div>
  <div class="status" id="status"></div>
  <button class="reset" onclick="resetToday()">↺ אפס את היום</button>
</div>
<a class="home" href="../index.html">🏠 הביתה</a>

<script>
// הרשימה לפי PHONE.md — צ'קליסט לפני משמרת
const ITEMS=[
  {icon:'🔋', tx:'שני הטלפונים טעונים 80%+'},
  {icon:'🛵', tx:'וולט מחובר ועובד (בשני הטלפונים)'},
  {icon:'🗺️', tx:'ווייז נפתח ו-GPS תופס'},
  {icon:'🔔', tx:'התראות פועלות'},
  {icon:'📶', tx:'גלישה סלולרית עובדת'},
  {icon:'🔌', tx:'מטען / סוללת גיבוי בתיק'},
];
const today=()=>new Date().toISOString().slice(0,10);
const load=()=>{try{const d=JSON.parse(localStorage.getItem('st_checklist'))||{};return d.date===today()?d.done:[]}catch(e){return[]}};
let done=load();
function persist(){localStorage.setItem('st_checklist',JSON.stringify({date:today(),done}))}
function render(){
  document.getElementById('list').innerHTML=ITEMS.map((it,i)=>`
    <div class="item ${done.includes(i)?'done':''}" onclick="toggle(${i})">
      <div class="box">${done.includes(i)?'✔️':it.icon}</div>
      <div class="tx">${it.tx}</div>
    </div>`).join('');
  const st=document.getElementById('status');
  if(done.length===ITEMS.length){
    st.className='status go'; st.textContent='🚀 הכל מוכן — צא לדרך ובהצלחה!';
  } else {
    st.className='status'; st.textContent=`${done.length} / ${ITEMS.length} — עוד קצת...`;
  }
}
function toggle(i){
  done=done.includes(i)?done.filter(x=>x!==i):[...done,i];
  persist(); render();
}
function resetToday(){done=[];persist();render()}
render();
</script>
</body>
</html>
