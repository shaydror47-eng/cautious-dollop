<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אימון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d14;--text:#f4f6fb;--muted:#9aa3b5;--card:#141826;--line:rgba(255,255,255,.08);
--accent:#fb7185;--accent2:#e11d48;--ok:#34d399;--bad:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Heebo',system-ui,sans-serif;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 110px}
h1{font-family:'Rubik';font-weight:900;font-size:30px;text-align:center;padding:14px 0 4px;
 background:linear-gradient(92deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px}
.time{font-family:'Rubik';font-weight:900;font-size:68px;text-align:center;letter-spacing:2px;
 font-variant-numeric:tabular-nums;margin:6px 0 16px;transition:color .3s}
.time.alert{color:var(--ok)}
.quick{display:flex;gap:10px;margin-bottom:12px}
.quick button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--text);cursor:pointer;
 font:700 16px 'Rubik';border-radius:16px;padding:15px 6px;transition:all .15s}
.quick button:active{transform:scale(.95)}
.quick button.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent}
.bigbtn{display:block;width:100%;border:none;cursor:pointer;color:#fff;font-family:'Rubik';font-weight:900;
 font-size:26px;border-radius:24px;padding:26px 20px;transition:transform .15s;
 box-shadow:0 14px 34px -12px rgba(225,29,72,.5)}
.bigbtn:active{transform:scale(.97)}
.bigbtn.start{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.bigbtn.stop{background:linear-gradient(135deg,#10b981,#047857);box-shadow:0 14px 34px -12px rgba(16,185,129,.5)}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-top:18px}
.card h2{font-family:'Rubik';font-weight:700;font-size:17px;margin-bottom:12px}
.didrow{display:flex;gap:10px}
.didrow button{flex:1;border:none;cursor:pointer;border-radius:16px;padding:18px 8px;font:900 17px 'Rubik';
 color:#fff;transition:all .15s;opacity:.92}
.didrow button:active{transform:scale(.95)}
.did-yes{background:linear-gradient(135deg,#10b981,#047857)}
.did-no{background:linear-gradient(135deg,#475569,#334155)}
.didrow button.picked{outline:3px solid #fff;opacity:1}
.streak{text-align:center;margin-top:14px;font-size:15px;color:var(--muted)}
.streak b{font-family:'Rubik';font-size:22px;color:var(--ok)}
.days{display:flex;gap:6px;justify-content:space-between;margin-top:14px;direction:ltr}
.day{flex:1;text-align:center}
.day .b{width:100%;aspect-ratio:1;min-height:38px;border-radius:11px;display:grid;place-items:center;
 font-size:17px;background:#0e1220;border:1.5px solid var(--line)}
.day.yes .b{background:rgba(52,211,153,.2);border-color:var(--ok)}
.day.no .b{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.4)}
.day .l{font-size:10.5px;color:var(--muted);margin-top:4px}
.hist{list-style:none}
.hist li{display:flex;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--line);font-size:14.5px}
.hist li:last-child{border-bottom:none}
.hist .d{color:var(--muted)}
.hist .m{font-family:'Rubik';font-weight:700;color:var(--ok)}
.empty{color:var(--muted);text-align:center;font-size:14px;padding:8px 0}
.home{position:fixed;bottom:18px;left:18px;z-index:9;color:#fff;border:none;text-decoration:none;
 background:linear-gradient(135deg,#8b5cf6,#6d28d9);border-radius:30px;padding:13px 20px;font:800 14.5px 'Heebo';
 box-shadow:0 10px 24px rgba(109,40,217,.5);transition:transform .15s}
.home:active{transform:scale(.93)}
</style>
</head>
<body>
<div class="wrap">
  <h1>💪 אימון</h1>
  <div class="sub">טיימר מהיר + יומן "עשיתי / לא עשיתי" — הכל נשמר.</div>

  <div class="time" id="time">00:00</div>
  <div class="quick">
    <button onclick="setMode(60,this)">⏲️ דקה</button>
    <button onclick="setMode(180,this)">3 דקות</button>
    <button onclick="setMode(300,this)">5 דקות</button>
    <button onclick="setMode(0,this)" class="on">סטופר</button>
  </div>
  <button class="bigbtn start" id="btn" onclick="toggle()">התחל</button>

  <div class="card">
    <h2>🗓️ התאמנתי היום?</h2>
    <div class="didrow">
      <button class="did-yes" id="byes" onclick="mark('yes')">✅ עשיתי!</button>
      <button class="did-no" id="bno" onclick="mark('no')">😴 לא היום</button>
    </div>
    <div class="streak" id="streak"></div>
    <div class="days" id="days"></div>
  </div>

  <div class="card">
    <h2>🏋️ אימונים אחרונים</h2>
    <ul class="hist" id="hist"><li class="empty">עוד אין — לחיצה אחת על "התחל" וזה מתחיל!</li></ul>
  </div>
</div>
<a class="home" href="../index.html">🏠 הביתה</a>

<script>
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)) ?? d}catch(e){return d}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let workouts=load('st_workouts',[]);
let days=load('st_workoutDays',{});   // {'2026-06-10':'yes'|'no'}
let active=load('st_activeWorkout',null);
let mode=0; // 0=stopwatch, otherwise countdown seconds
let tick=null;
const iso=d=>d.toISOString().slice(0,10);

function fmt(s){
  s=Math.max(0,Math.round(s));
  const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;
  return h>0?[h,m,x].map(n=>String(n).padStart(2,'0')).join(':'):[m,x].map(n=>String(n).padStart(2,'0')).join(':');
}
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.value=.3;
    o.start();setTimeout(()=>{o.stop();ctx.close()},700);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
}
function setMode(sec,btn){
  if(active) return alert('קודם תסיים את הטיימר שרץ 🙂');
  mode=sec;
  document.querySelectorAll('.quick button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('time').textContent=fmt(sec);
}
function update(){
  const t=document.getElementById('time');
  if(!active) return;
  const el=(Date.now()-active.start)/1000;
  if(active.mode>0){
    const left=active.mode-el;
    t.textContent=fmt(left);
    if(left<=0){ t.classList.add('alert'); beep(); finish(); }
  } else t.textContent=fmt(el);
}
function render(){
  const btn=document.getElementById('btn');
  if(active){ btn.textContent='סיים ✅'; btn.className='bigbtn stop';
    if(!tick) tick=setInterval(update,250);
  } else { btn.textContent='התחל'; btn.className='bigbtn start';
    if(tick){clearInterval(tick);tick=null}
    document.getElementById('time').textContent=fmt(mode);
    document.getElementById('time').classList.remove('alert');
  }
  // day log: last 7 days
  const today=iso(new Date());
  document.getElementById('byes').classList.toggle('picked',days[today]==='yes');
  document.getElementById('bno').classList.toggle('picked',days[today]==='no');
  let streak=0; const d=new Date();
  while(days[iso(d)]==='yes'){streak++;d.setDate(d.getDate()-1)}
  document.getElementById('streak').innerHTML=streak>0
    ? `רצף: <b>${streak}</b> ימים 🔥`
    : 'עוד אין רצף — היום מתחילים! 💪';
  const names=['א','ב','ג','ד','ה','ו','ש'];
  let html='';
  for(let i=6;i>=0;i--){
    const dd=new Date();dd.setDate(dd.getDate()-i);
    const v=days[iso(dd)];
    html+=`<div class="day ${v==='yes'?'yes':v==='no'?'no':''}">
      <div class="b">${v==='yes'?'✅':v==='no'?'·':''}</div>
      <div class="l">${i===0?'היום':names[dd.getDay()]}</div></div>`;
  }
  document.getElementById('days').innerHTML=html;
  const hist=document.getElementById('hist');
  if(workouts.length){
    hist.innerHTML=workouts.slice(-7).reverse().map(w=>{
      const d2=new Date(w.end);
      return `<li><span><b>${d2.getDate()}/${d2.getMonth()+1}</b> <span class="d">· ${d2.getHours()}:${String(d2.getMinutes()).padStart(2,'0')}</span></span><span class="m">${fmt((w.end-w.start)/1000)}</span></li>`;
    }).join('');
  }
}
function finish(){
  workouts.push({start:active.start,end:Date.now()});
  save('st_workouts',workouts);
  // אימון שהושלם מסמן אוטומטית "עשיתי" להיום
  days[iso(new Date())]='yes'; save('st_workoutDays',days);
  active=null; localStorage.removeItem('st_activeWorkout');
  render();
}
function toggle(){
  if(!active){
    active={start:Date.now(),mode};
    save('st_activeWorkout',active);
    render();
  } else finish();
}
function mark(v){
  const today=iso(new Date());
  days[today]=days[today]===v?undefined:v;  // לחיצה שנייה מבטלת
  if(days[today]===undefined) delete days[today];
  save('st_workoutDays',days);
  render();
}
render();
</script>
</body>
</html>
