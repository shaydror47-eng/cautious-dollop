<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המרכז שלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d14;--text:#f4f6fb;--muted:#9aa3b5;--card:#141826;--line:rgba(255,255,255,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Heebo',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;
 background-image:
  radial-gradient(1.5px 1.5px at 20% 30%, #fff8, transparent),
  radial-gradient(1px 1px at 70% 15%, #fff6, transparent),
  radial-gradient(1.5px 1.5px at 85% 60%, #fff7, transparent),
  radial-gradient(1px 1px at 40% 80%, #fff5, transparent),
  radial-gradient(1.5px 1.5px at 10% 65%, #fff6, transparent),
  radial-gradient(1px 1px at 55% 45%, #fff4, transparent)}
.wrap{max-width:920px;margin:0 auto;padding:26px 18px 70px;position:relative}
header{text-align:center;padding:30px 0 10px}
.logo{font-family:'Rubik';font-weight:900;font-size:42px;letter-spacing:-1px;
 background:linear-gradient(92deg,#ffd166,#ff7e5f 35%,#c084fc 70%,#38bdf8);
 -webkit-background-clip:text;background-clip:text;color:transparent;
 animation:shine 6s linear infinite;background-size:200% 100%}
@keyframes shine{to{background-position:200% 0}}
.tag{color:var(--muted);font-size:15px;margin-top:6px}
.tag b{color:var(--text)}
.grid{display:grid;grid-template-columns:1fr;gap:18px;margin-top:30px}
@media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}
.world{position:relative;border:none;cursor:pointer;text-align:right;color:#fff;font:inherit;
 border-radius:24px;min-height:175px;padding:22px 22px 20px;overflow:hidden;
 display:flex;flex-direction:column;justify-content:flex-end;
 transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
 box-shadow:0 10px 30px -12px rgba(0,0,0,.6);isolation:isolate}
.world:hover{transform:translateY(-6px) scale(1.015)}
.world:active{transform:scale(.985)}
.world:focus-visible{outline:3px solid #fff;outline-offset:3px}
.world .big{position:absolute;left:-12px;top:-22px;font-size:130px;opacity:.9;z-index:0;
 filter:drop-shadow(0 12px 24px rgba(0,0,0,.35));transition:transform .35s ease}
.world:hover .big{transform:rotate(-8deg) scale(1.1)}
.world::after{content:"";position:absolute;inset:0;z-index:1;
 background:linear-gradient(to top, rgba(0,0,0,.45), transparent 65%)}
.world > *{position:relative;z-index:2}
.world .wt{font-family:'Rubik';font-weight:900;font-size:26px;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.world .ws{font-size:13.5px;opacity:.92;margin-top:3px;font-weight:500}
.world .chip{position:absolute;top:16px;right:18px;z-index:2;
 background:rgba(0,0,0,.35);backdrop-filter:blur(4px);
 border:1px solid rgba(255,255,255,.25);border-radius:30px;padding:5px 13px;font-size:13px;font-weight:700}
.w-delivery{background:radial-gradient(circle at 80% 20%, #ffe29f55, transparent 50%),linear-gradient(135deg,#f9763b,#e8453c 55%,#b91c4b)}
.w-money{background:radial-gradient(circle at 85% 15%, #d9f99d55, transparent 50%),linear-gradient(135deg,#13b380,#0e8f6f 55%,#065f55)}
.w-biz{background:radial-gradient(circle at 80% 20%, #f0abfc44, transparent 50%),linear-gradient(135deg,#8b5cf6,#6d28d9 55%,#4c1d95)}
.w-misc{background:radial-gradient(circle at 80% 20%, #fda4af44, transparent 50%),linear-gradient(135deg,#fb7185,#e11d48 55%,#9f1239)}
.w-grow{background:radial-gradient(circle at 80% 20%, #99f6e444, transparent 50%),linear-gradient(135deg,#2dd4bf,#0d9488 55%,#115e59)}
@media(min-width:640px){.w-delivery{grid-column:1 / -1;min-height:200px}.w-delivery .big{font-size:170px}}
.view{display:none}
.view.active{display:block;animation:in .3s ease}
@keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.home.hidden{display:none}
.vhead{border-radius:24px;padding:26px 22px;position:relative;overflow:hidden;margin-top:14px;
 box-shadow:0 10px 30px -12px rgba(0,0,0,.6)}
.vhead .big{position:absolute;left:-8px;top:-25px;font-size:120px;opacity:.85;
 filter:drop-shadow(0 12px 24px rgba(0,0,0,.35))}
.vhead h2{font-family:'Rubik';font-weight:900;font-size:30px;position:relative;text-shadow:0 2px 10px rgba(0,0,0,.4)}
.vhead p{position:relative;font-size:14px;opacity:.92;margin-top:4px;font-weight:500}
.back{display:inline-flex;align-items:center;gap:8px;margin-top:6px;
 background:var(--card);border:1px solid var(--line);color:var(--text);
 border-radius:14px;padding:11px 18px;font:700 14.5px 'Heebo';cursor:pointer;transition:background .15s}
.back:hover{background:#1c2233}
.tools{display:grid;grid-template-columns:1fr;gap:12px;margin-top:18px}
@media(min-width:560px){.tools{grid-template-columns:1fr 1fr}}
.tool{display:flex;align-items:center;gap:14px;text-align:right;cursor:pointer;color:inherit;font:inherit;text-decoration:none;
 background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;
 transition:transform .18s, border-color .18s, background .18s}
.tool:hover{transform:translateY(-3px);background:#1a2030;border-color:rgba(255,255,255,.18)}
.tool:focus-visible{outline:2px solid #fff;outline-offset:3px}
.tool .tk{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:24px;flex:none;
 background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.03));border:1px solid var(--line)}
.tool .tt{font-family:'Rubik';font-weight:700;font-size:16px}
.tool .st{font-size:12.5px;margin-top:3px;font-weight:500;color:#34d399}
.tool .arr{margin-right:auto;color:var(--muted);font-size:22px;transform:scaleX(-1)}
footer{margin-top:46px;text-align:center;color:var(--muted);font-size:12.5px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="home" id="home">
    <header>
      <div class="logo">המרכז שלי</div>
      <div class="tag">כל הכלים שלך · <b>במקום אחד</b></div>
    </header>
    <div class="grid" id="cats"></div>
    <footer>לוחצים על עולם → בוחרים כלי → עובדים 🚀</footer>
  </div>

  <div class="view" id="view">
    <button class="back" onclick="goHome()">→ חזרה לעולמות</button>
    <div class="vhead" id="vHead">
      <div class="big" id="vBig"></div>
      <h2 id="vTitle"></h2>
      <p id="vSub"></p>
    </div>
    <div class="tools" id="tools"></div>
  </div>

</div>

<script>
const DATA = [
  { id:"delivery", title:"עולם משלוחים", icon:"🛵", cls:"w-delivery",
    sub:"הרחוב שלך. הכסף שלך. כל כלי שעוזר לך לעשות יום מושלם.",
    tools:[
      {name:"כפתור משמרת", desc:"התחלתי / סיימתי — והרווח נרשם", icon:"🟢", url:"tools/shift.html"},
      {name:"בדיקה לפני משמרת", desc:"טלפונים, וולט, GPS — וי ויוצאים", icon:"✅", url:"tools/checklist.html"},
      {name:"לוח שליטה וולט", desc:"רווחים, מחזורים, אזורים", icon:"📊", url:"tools/wolt-dashboard.html"},
      {name:"אפליקציית הוולט (חי באוויר)", desc:"מחשבון כדאיות + טיימר משמרת", icon:"📱", url:"https://guileless-macaron-451cd2.netlify.app", ext:true},
    ]},
  { id:"money", title:"כסף וחישובים", icon:"🧮", cls:"w-money",
    sub:"מחשבונים נקיים. מתחיל מאפס, בלי נתונים ישנים.",
    tools:[
      {name:"הוצאות מהירות", desc:"סכום → קטגוריה → נשמר", icon:"💸", url:"tools/expenses.html"},
      {name:"מחלקים את החשבון", desc:"חלוקה הוגנת בשנייה", icon:"➗", url:"tools/bill-splitter.html"},
    ]},
  { id:"biz", title:"עסקים", icon:"💼", cls:"w-biz",
    sub:"מכירות, פייסבוק, קידום — כל מה שמזיז את העסק.",
    tools:[
      {name:"שעות עם אורי", desc:"חי באוויר — לחיצה ופותחים", icon:"⏰", url:"https://calm-biscochitos-855f2a.netlify.app", ext:true},
      {name:"בונה הפוסטים", desc:"פוסט מכירה מוכן לקבוצות", icon:"📝", url:"tools/post-builder.html"},
    ]},
  { id:"grow", title:"שיפור עצמי", icon:"🌱", cls:"w-grow",
    sub:"כל יום קצת יותר חזק. גוף, ראש, שינה — הכל נרשם.",
    tools:[
      {name:"המשימה של היום", desc:"דבר אחד חשוב — ובוצע", icon:"🎯", url:"tools/goal.html"},
      {name:"אימון", desc:"טיימר דקה + יומן עשיתי/לא עשיתי", icon:"💪", url:"tools/timer.html"},
      {name:"מים", desc:"8 כוסות ביום, לחיצה לכוס", icon:"💧", url:"tools/water.html"},
      {name:"שינה", desc:"כמה ישנת — וכמה כדאי", icon:"😴", url:"tools/sleep.html"},
      {name:"איך היה היום?", desc:"פרצוף + משפט, 10 שניות", icon:"📓", url:"tools/mood.html"},
      {name:"דקה של שקט", desc:"נשימות עם העיגול", icon:"🧘", url:"tools/breathe.html"},
    ]},
  { id:"misc", title:"שונות", icon:"🎡", cls:"w-misc",
    sub:"הגלגל, הרגלים, וכל הכלים הכיפיים.",
    tools:[
      {name:"גלגל ההחלטות", desc:"מסובבים ומחליטים", icon:"🎡", url:"tools/wheel.html"},
      {name:"בלאק ג'ק", desc:"שולחן עם 5 ידיים מול הדילר", icon:"🃏", url:"tools/blackjack.html"},
      {name:"החלפת הרגלים", desc:"תחביב במקום הרגל", icon:"🔄", url:"tools/habits.html"},
      {name:"גיבוי וייצוא", desc:"כל הנתונים שלך בקובץ אחד", icon:"💾", url:"tools/backup.html"},
    ]},
];

const cats=document.getElementById('cats');
DATA.forEach(c=>{
  const b=document.createElement('button');
  b.className='world '+c.cls;
  b.onclick=()=>openCat(c.id);
  b.innerHTML=`
    <div class="big">${c.icon}</div>
    <span class="chip">${c.tools.length} כלים</span>
    <div class="wt">${c.title}</div>
    <div class="ws">${c.sub}</div>`;
  cats.appendChild(b);
});

const home=document.getElementById('home');
const view=document.getElementById('view');
const toolsBox=document.getElementById('tools');
const vHead=document.getElementById('vHead');

function openCat(id){
  const c=DATA.find(x=>x.id===id);
  vHead.className='vhead '+c.cls;
  document.getElementById('vBig').textContent=c.icon;
  document.getElementById('vTitle').textContent=c.title;
  document.getElementById('vSub').textContent=c.sub;
  toolsBox.innerHTML='';
  c.tools.forEach(t=>{
    const el=document.createElement('a');
    el.className='tool';
    el.href=t.url;
    if(t.ext){el.target='_blank';el.rel='noopener';}
    el.innerHTML=`
      <div class="tk">${t.icon}</div>
      <div>
        <div class="tt">${t.name}</div>
        <div class="st">● ${t.desc}</div>
      </div>
      <div class="arr">›</div>`;
    toolsBox.appendChild(el);
  });
  home.classList.add('hidden');
  view.classList.add('active');
  window.scrollTo(0,0);
}
function goHome(){
  view.classList.remove('active');
  home.classList.remove('hidden');
  window.scrollTo(0,0);
}
</script>
</body>
</html>
